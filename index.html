<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f6f8;
            padding-bottom: 60px;
        }

        .app-title {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .action-btn {
            border-radius: 12px;
            font-weight: 600;
            padding: 14px;
        }

        .action-btn i {
            font-size: 1.1rem;
        }

        #preview {
            max-width: 100%;
            max-height: 340px;
            border-radius: 12px;
            display: none;
            margin: 0 auto;
        }

        .preview-wrap {
            text-align: center;
        }

        textarea.result {
            border-radius: 12px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 220px;
        }

        .copy-btn {
            border: none;
            background: none;
            cursor: pointer;
            color: #6c757d;
            font-size: 1rem;
        }

        .copy-btn:hover {
            color: #0d6efd;
        }

        .muted-help {
            font-size: 0.85rem;
            color: #8a909a;
        }

        .key-row .form-control {
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="container py-4" style="max-width: 640px;">
        <h1 class="app-title text-center mb-1"><i class="fa-solid fa-receipt me-2"></i>Receipt Scanner</h1>
        <p class="text-center muted-help mb-4">Upload or snap a receipt — items and prices appear below. Nothing is
            saved.</p>

        <!-- API key -->
        <div class="card p-3 mb-3">
            <label class="muted-help mb-1"><i class="fa-solid fa-key me-1"></i>Anthropic API key</label>
            <div class="input-group key-row">
                <input type="password" id="apiKey" class="form-control" placeholder="sk-ant-…"
                    autocomplete="off" spellcheck="false">
                <button class="btn btn-outline-secondary" type="button" onclick="toggleKey()" title="Show/hide">
                    <i id="keyEye" class="fa-regular fa-eye"></i>
                </button>
                <button class="btn btn-outline-secondary" type="button" onclick="saveKey()" title="Remember on this device">
                    <i id="keySave" class="fa-regular fa-floppy-disk"></i>
                </button>
            </div>
            <div class="muted-help mt-2">Kept only in this browser. Nothing is sent anywhere except directly to
                Anthropic when you scan.</div>
        </div>

        <!-- Inputs -->
        <div class="card p-3 mb-3">
            <div class="row g-2">
                <div class="col-6">
                    <button class="btn btn-primary action-btn w-100" onclick="fileInput.click()">
                        <i class="fa-solid fa-image me-2"></i>Upload
                    </button>
                </div>
                <div class="col-6">
                    <button class="btn btn-outline-primary action-btn w-100" onclick="cameraInput.click()">
                        <i class="fa-solid fa-camera me-2"></i>Camera
                    </button>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">

            <div class="preview-wrap mt-3">
                <img id="preview" alt="Receipt preview">
            </div>

            <button id="scanBtn" class="btn btn-success action-btn w-100 mt-3 hidden" onclick="runScan()">
                <i class="fa-solid fa-magnifying-glass me-2"></i>Scan receipt
            </button>
        </div>

        <!-- Result -->
        <div id="resultCard" class="card p-3 hidden">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <strong>Items</strong>
                <button class="copy-btn" title="Copy" onclick="copyResult()">
                    <i class="fa-regular fa-copy"></i> <span id="copyLabel">Copy</span>
                </button>
            </div>
            <textarea id="result" class="form-control result" spellcheck="false"
                placeholder="Scanned items will appear here…"></textarea>
            <div class="muted-help mt-2">You can edit the text above before copying.</div>
        </div>
    </div>

    <script>
        // Cheapest capable vision model. Swap to "claude-opus-4-8" for max accuracy.
        const MODEL = 'claude-haiku-4-5';
        const MAX_EDGE = 1600; // downscale longest edge to keep token cost low

        const apiKey = document.getElementById('apiKey');
        const fileInput = document.getElementById('fileInput');
        const cameraInput = document.getElementById('cameraInput');
        const preview = document.getElementById('preview');
        const scanBtn = document.getElementById('scanBtn');
        const resultCard = document.getElementById('resultCard');
        const result = document.getElementById('result');

        let currentFile = null;

        // restore saved key
        apiKey.value = localStorage.getItem('anthropic_api_key') || '';

        function saveKey() {
            localStorage.setItem('anthropic_api_key', apiKey.value.trim());
            const icon = document.getElementById('keySave');
            icon.className = 'fa-solid fa-check text-success';
            setTimeout(() => icon.className = 'fa-regular fa-floppy-disk', 1500);
        }

        function toggleKey() {
            const showing = apiKey.type === 'text';
            apiKey.type = showing ? 'password' : 'text';
            document.getElementById('keyEye').className = showing ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
        }

        function loadImage(file) {
            if (!file) return;
            currentFile = file;
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            scanBtn.classList.remove('hidden');
            resultCard.classList.add('hidden');
        }

        fileInput.addEventListener('change', e => loadImage(e.target.files[0]));
        cameraInput.addEventListener('change', e => loadImage(e.target.files[0]));

        // Downscale + re-encode as JPEG, return { media_type, data } with base64 (no prefix).
        function toBase64Image(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    let { width, height } = img;
                    const scale = Math.min(1, MAX_EDGE / Math.max(width, height));
                    width = Math.round(width * scale);
                    height = Math.round(height * scale);
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                    resolve({ media_type: 'image/jpeg', data: dataUrl.split(',')[1] });
                };
                img.onerror = () => reject(new Error('Could not read the image.'));
                img.src = URL.createObjectURL(file);
            });
        }

        const PROMPT = `This image is a shopping receipt. List every purchased line item with its price.
Output one item per line in the format:  item name<TAB>price
- Keep the currency and decimal format exactly as printed on the receipt.
- Do not add a header, totals, tax, store info, or any commentary.
- If the receipt is unreadable, reply only with: (could not read receipt)`;

        async function runScan() {
            const key = apiKey.value.trim();
            if (!key) { alert('Enter your Anthropic API key first.'); return; }
            if (!currentFile) return;

            scanBtn.disabled = true;
            const original = scanBtn.innerHTML;
            scanBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Reading…';

            try {
                const image = await toBase64Image(currentFile);
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'content-type': 'application/json',
                        'x-api-key': key,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        max_tokens: 1024,
                        messages: [{
                            role: 'user',
                            content: [
                                { type: 'image', source: { type: 'base64', media_type: image.media_type, data: image.data } },
                                { type: 'text', text: PROMPT }
                            ]
                        }]
                    })
                });

                const data = await res.json();
                if (!res.ok) {
                    const msg = data && data.error ? data.error.message : ('HTTP ' + res.status);
                    throw new Error(msg);
                }
                const text = (data.content || [])
                    .filter(b => b.type === 'text')
                    .map(b => b.text)
                    .join('\n')
                    .trim();
                result.value = text || '(no text returned)';
                resultCard.classList.remove('hidden');
            } catch (err) {
                result.value = 'Error: ' + err.message;
                resultCard.classList.remove('hidden');
            } finally {
                scanBtn.disabled = false;
                scanBtn.innerHTML = original;
            }
        }

        async function copyResult() {
            try {
                await navigator.clipboard.writeText(result.value);
            } catch {
                result.select();
                document.execCommand('copy');
            }
            const label = document.getElementById('copyLabel');
            label.textContent = 'Copied!';
            setTimeout(() => label.textContent = 'Copy', 1500);
        }
    </script>
</body>

</html>
