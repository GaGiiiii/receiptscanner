<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f6f8;
            padding-bottom: 60px;
        }

        .app-title {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .action-btn {
            border-radius: 12px;
            font-weight: 600;
            padding: 14px;
        }

        .action-btn i {
            font-size: 1.1rem;
        }

        #preview {
            max-width: 100%;
            max-height: 340px;
            border-radius: 12px;
            display: none;
            margin: 0 auto;
        }

        .preview-wrap {
            text-align: center;
        }

        textarea.result {
            border-radius: 12px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 220px;
        }

        .copy-btn {
            border: none;
            background: none;
            cursor: pointer;
            color: #6c757d;
            font-size: 1rem;
        }

        .copy-btn:hover {
            color: #0d6efd;
        }

        .progress {
            height: 8px;
            border-radius: 999px;
        }

        .muted-help {
            font-size: 0.85rem;
            color: #8a909a;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="container py-4" style="max-width: 640px;">
        <h1 class="app-title text-center mb-1"><i class="fa-solid fa-receipt me-2"></i>Receipt Scanner</h1>
        <p class="text-center muted-help mb-4">Upload or snap a receipt — items and prices appear below. Nothing is
            saved.</p>

        <!-- Inputs -->
        <div class="card p-3 mb-3">
            <div class="row g-2">
                <div class="col-6">
                    <button class="btn btn-primary action-btn w-100" onclick="fileInput.click()">
                        <i class="fa-solid fa-image me-2"></i>Upload
                    </button>
                </div>
                <div class="col-6">
                    <button class="btn btn-outline-primary action-btn w-100" onclick="cameraInput.click()">
                        <i class="fa-solid fa-camera me-2"></i>Camera
                    </button>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">

            <div class="preview-wrap mt-3">
                <img id="preview" alt="Receipt preview">
            </div>

            <button id="scanBtn" class="btn btn-success action-btn w-100 mt-3 hidden" onclick="runScan()">
                <i class="fa-solid fa-magnifying-glass me-2"></i>Scan receipt
            </button>

            <div id="progressWrap" class="mt-3 hidden">
                <div class="progress">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                        style="width: 0%"></div>
                </div>
                <div id="progressLabel" class="text-center muted-help mt-2">Starting…</div>
            </div>
        </div>

        <!-- Result -->
        <div id="resultCard" class="card p-3 hidden">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <strong>Items</strong>
                <div>
                    <button class="copy-btn me-2" title="Toggle raw text" onclick="toggleRaw()">
                        <i class="fa-solid fa-file-lines"></i>
                    </button>
                    <button class="copy-btn" title="Copy" onclick="copyResult()">
                        <i class="fa-regular fa-copy"></i> <span id="copyLabel">Copy</span>
                    </button>
                </div>
            </div>
            <textarea id="result" class="form-control result" spellcheck="false"
                placeholder="Scanned items will appear here…"></textarea>
            <div class="muted-help mt-2">You can edit the text above before copying.</div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const cameraInput = document.getElementById('cameraInput');
        const preview = document.getElementById('preview');
        const scanBtn = document.getElementById('scanBtn');
        const progressWrap = document.getElementById('progressWrap');
        const progressBar = document.getElementById('progressBar');
        const progressLabel = document.getElementById('progressLabel');
        const resultCard = document.getElementById('resultCard');
        const result = document.getElementById('result');

        let currentFile = null;
        let rawText = '';
        let showingRaw = false;

        function loadImage(file) {
            if (!file) return;
            currentFile = file;
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            scanBtn.classList.remove('hidden');
            resultCard.classList.add('hidden');
        }

        fileInput.addEventListener('change', e => loadImage(e.target.files[0]));
        cameraInput.addEventListener('change', e => loadImage(e.target.files[0]));

        async function runScan() {
            if (!currentFile) return;
            scanBtn.disabled = true;
            progressWrap.classList.remove('hidden');
            setProgress(0, 'Loading OCR engine…');

            try {
                const { data } = await Tesseract.recognize(currentFile, 'eng', {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            setProgress(Math.round(m.progress * 100), 'Reading receipt…');
                        } else {
                            setProgress(progressBar.style.width ? parseInt(progressBar.style.width) : 0,
                                m.status.charAt(0).toUpperCase() + m.status.slice(1) + '…');
                        }
                    }
                });
                rawText = data.text || '';
                showingRaw = false;
                result.value = parseReceipt(rawText);
                resultCard.classList.remove('hidden');
                setProgress(100, 'Done');
            } catch (err) {
                result.value = 'Error reading image: ' + err.message;
                resultCard.classList.remove('hidden');
            } finally {
                scanBtn.disabled = false;
                setTimeout(() => progressWrap.classList.add('hidden'), 800);
            }
        }

        function setProgress(pct, label) {
            progressBar.style.width = pct + '%';
            progressLabel.textContent = label;
        }

        // Turn raw OCR text into "item    price" lines.
        // Matches a price at the end of a line: 1.234,56 / 1,234.56 / 12.99 / 12,99
        function parseReceipt(text) {
            const priceRe = /(\d{1,3}(?:[.,]\d{3})*(?:[.,]\d{2}))\s*$/;
            const lines = text.split('\n');
            const items = [];

            for (let raw of lines) {
                const line = raw.trim();
                if (!line) continue;
                const m = line.match(priceRe);
                if (!m) continue;

                let name = line.slice(0, m.index).trim();
                // strip trailing separators/quantity noise like "x1", "*", ":"
                name = name.replace(/[\s.·*:xX\-]+$/, '').trim();
                if (!name) continue;

                const price = m[1];
                items.push(padName(name) + price);
            }

            if (!items.length) {
                return '(No item/price lines detected. Tap the document icon to see the raw text.)';
            }
            return items.join('\n');
        }

        function padName(name) {
            // pad to a column so prices align in the textarea
            const width = 28;
            if (name.length >= width) return name + '  ';
            return name + ' '.repeat(width - name.length);
        }

        function toggleRaw() {
            if (!rawText) return;
            showingRaw = !showingRaw;
            result.value = showingRaw ? rawText : parseReceipt(rawText);
        }

        async function copyResult() {
            try {
                await navigator.clipboard.writeText(result.value);
            } catch {
                result.select();
                document.execCommand('copy');
            }
            const label = document.getElementById('copyLabel');
            label.textContent = 'Copied!';
            setTimeout(() => label.textContent = 'Copy', 1500);
        }
    </script>
</body>

</html>
